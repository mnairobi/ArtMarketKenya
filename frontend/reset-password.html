<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset Password | Kenyan Art Market</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

    <!-- Loading State -->
    <div id="loading-state" class="text-center py-8">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto mb-4"></div>
      <p class="text-gray-500">Validating reset link...</p>
    </div>

    <!-- Invalid Token State -->
    <div id="invalid-state" class="text-center hidden py-4">
      <div class="text-5xl mb-4">❌</div>
      <h2 class="text-xl font-bold text-gray-700 mb-2">Invalid or Expired Link</h2>
      <p id="invalid-reason" class="text-gray-500 mb-6">This password reset link is no longer valid.</p>
      <a href="./forgot-password.html"
        class="inline-block bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 font-medium">
        Request New Link
      </a>
    </div>

    <!-- Reset Form State -->
    <div id="form-state" class="hidden">
      <h2 class="text-2xl font-bold mb-2 text-center text-gray-700">🔐 Set New Password</h2>
      <p id="reset-email" class="text-center text-gray-500 mb-6"></p>

      <form id="resetForm" class="space-y-4">
        <div>
          <label for="new_password" class="block text-gray-600 mb-2">New Password</label>
          <input type="password" id="new_password" name="new_password" required
            minlength="6" placeholder="At least 6 characters"
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" />
        </div>

        <div>
          <label for="confirm_password" class="block text-gray-600 mb-2">Confirm Password</label>
          <input type="password" id="confirm_password" name="confirm_password" required
            minlength="6" placeholder="Type password again"
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" />
        </div>

        <!-- Password strength indicator -->
        <div id="password-strength" class="hidden">
          <div class="flex gap-1">
            <div id="str-bar-1" class="h-1 flex-1 rounded bg-gray-200"></div>
            <div id="str-bar-2" class="h-1 flex-1 rounded bg-gray-200"></div>
            <div id="str-bar-3" class="h-1 flex-1 rounded bg-gray-200"></div>
            <div id="str-bar-4" class="h-1 flex-1 rounded bg-gray-200"></div>
          </div>
          <p id="str-text" class="text-xs mt-1 text-gray-400"></p>
        </div>

        <button type="submit" id="resetBtn"
          class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-medium">
          Reset Password
        </button>
      </form>
    </div>

    <!-- Success State -->
    <div id="success-state" class="text-center hidden py-4">
      <div class="text-5xl mb-4">✅</div>
      <h2 class="text-xl font-bold text-gray-700 mb-2">Password Reset!</h2>
      <p class="text-gray-500 mb-6">Your password has been updated successfully.</p>
      <a href="./login.html"
        class="inline-block bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 font-medium">
        Go to Login
      </a>
    </div>

    <p id="reset-message" class="text-center mt-4 text-sm"></p>
  </div>

  <script type="module" src="./js/reset-password.js"></script>
</body>
</html>
