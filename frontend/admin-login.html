<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Sign In — SANAA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'display': ['Playfair Display', 'serif'],
            'sans': ['Inter', 'sans-serif'],
          },
          colors: {
            'gallery': {
              50: '#fafafa', 100: '#f5f5f5', 200: '#e5e5e5', 300: '#d4d4d4',
              400: '#a3a3a3', 500: '#737373', 600: '#525252', 700: '#404040',
              800: '#262626', 900: '#171717', 950: '#0a0a0a',
            },
            'accent': { DEFAULT: '#c9a962', light: '#dfc88a', dark: '#a88b3d' },
            'admin': { DEFAULT: '#7c3aed', light: '#a78bfa', dark: '#6d28d9' }
          },
        }
      }
    }
  </script>

  <style>
    .auth-bg {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
    }
    .auth-pattern {
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%237c3aed' fill-opacity='0.1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
  </style>
</head>
<body class="auth-bg auth-pattern min-h-screen flex items-center justify-center p-4 font-sans antialiased">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="./index.html" class="inline-flex items-center gap-2">
        <div class="w-12 h-12 bg-admin rounded-full flex items-center justify-center">
          <span class="text-white font-display text-xl">S</span>
        </div>
        <span class="font-display text-3xl text-white">SANAA</span>
      </a>
      <p class="text-white/70 text-sm mt-2">Administration Panel</p>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-3xl shadow-2xl p-8">
      <div class="text-center mb-6">
        <div class="w-16 h-16 bg-admin/10 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <svg class="w-8 h-8 text-admin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </div>
        <h1 class="font-display text-2xl text-gallery-900 mb-2">Admin Access</h1>
        <p class="text-gallery-500 text-sm">Restricted area • Authorized personnel only</p>
      </div>

      <!-- Security Notice -->
      <div class="bg-amber-50 border border-amber-200 rounded-xl p-4 mb-6">
        <div class="flex gap-3">
          <svg class="w-5 h-5 text-amber-600 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
          </svg>
          <p class="text-xs text-amber-800">
            This is a restricted area. Unauthorized access attempts will be logged and reported.
          </p>
        </div>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-gallery-700 mb-2">Admin Email</label>
          <input type="email" id="email" name="email" required
            placeholder="admin@sanaa.com"
            class="w-full px-4 py-3 border border-gallery-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-admin/20 focus:border-admin transition"/>
        </div>

        <div>
          <div class="flex items-center justify-between mb-2">
            <label for="password" class="block text-sm font-medium text-gallery-700">Password</label>
            <a href="./forgot-password.html" class="text-xs text-admin hover:text-admin-dark transition">
              Forgot password?
            </a>
          </div>
          <div class="relative">
            <input type="password" id="password" name="password" required
              placeholder="••••••••"
              class="w-full px-4 py-3 border border-gallery-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-admin/20 focus:border-admin transition pr-12"/>
            <button type="button" id="toggle-password" 
              class="absolute right-4 top-1/2 -translate-y-1/2 text-gallery-400 hover:text-gallery-600 transition">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" id="loginBtn"
          class="w-full bg-admin text-white py-3.5 rounded-xl hover:bg-admin-dark transition font-medium flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <span>Secure Sign In</span>
        </button>
      </form>

      <!-- Message -->
      <p id="login-message" class="text-center mt-4 text-sm"></p>
    </div>

    <!-- Other Login Options -->
    <div class="mt-6 text-center">
      <p class="text-white/70 text-sm mb-3">Not an admin?</p>
      <div class="flex justify-center gap-4">
        <a href="./login.html" 
          class="px-4 py-2 bg-white/10 text-white text-sm rounded-lg hover:bg-white/20 transition flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          Buyer
        </a>
        <a href="./artist-login.html" 
          class="px-4 py-2 bg-white/10 text-white text-sm rounded-lg hover:bg-white/20 transition flex items-center gap-2">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          Artist
        </a>
      </div>
    </div>
  </div>

  <script type="module" src="./js/auth.js"></script>
  <script>
    window.authRole = 'admin';
  </script>
</body>
</html>
