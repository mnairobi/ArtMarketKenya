<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register | Art Market</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center py-8">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold mb-2 text-center text-gray-700">Create Account</h2>
    <p class="text-center text-gray-500 mb-6">Join the Kenyan Art Market</p>

    <form id="registerForm" class="space-y-4">
      <div>
        <label for="username" class="block text-gray-600 mb-2">Username</label>
        <input
          type="text"
          name="username"
          id="username"
          required
          placeholder="Choose a username"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
        <p class="text-xs text-gray-500 mt-1">This will be your display name</p>
      </div>

      <div>
        <label for="email" class="block text-gray-600 mb-2">Email</label>
        <input
          type="email"
          name="email"
          id="email"
          required
          placeholder="your@email.com"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <div>
        <label for="password" class="block text-gray-600 mb-2">Password</label>
        <input
          type="password"
          name="password"
          id="password"
          required
          minlength="6"
          placeholder="At least 6 characters"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
        <div id="password-strength"></div>
      </div>

      <div>
        <label for="role" class="block text-gray-600 mb-2">I want to:</label>
        <select
          name="role"
          id="role"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 bg-white"
        >
          <option value="buyer" selected>Buy Art (Buyer)</option>
          <option value="artist">Sell Art (Artist)</option>
        </select>
        <p class="text-xs text-gray-500 mt-1">You can change this later in your profile</p>
      </div>

      <!-- Terms and conditions -->
      <div class="flex items-start">
        <input
          type="checkbox"
          id="terms"
          name="terms"
          required
          class="mt-1 mr-2"
        />
        <label for="terms" class="text-xs text-gray-600">
          I agree to the <a href="#" class="text-blue-600 hover:underline">Terms and Conditions</a> 
          and <a href="#" class="text-blue-600 hover:underline">Privacy Policy</a>
        </label>
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-medium"
      >
        Register
      </button>
    </form>

    <div class="mt-6 text-center">
      <p class="text-gray-600">
        Already have an account?
      </p>
      <div class="mt-2 space-x-4 text-sm">
        <a href="./login.html" class="text-blue-600 hover:underline">Buyer Login</a>
        <a href="./artist-login.html" class="text-green-600 hover:underline">Artist Login</a>
        <a href="./admin-login.html" class="text-purple-600 hover:underline">Admin Login</a>
      </div>
    </div>

    <p id="register-message" class="text-center mt-4 text-sm"></p>
  </div>

  <script type="module" src="./js/auth.js"></script>
</body>
</html>
