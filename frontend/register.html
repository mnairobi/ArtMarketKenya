<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register | Art Market</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-700">Create Account</h2>

    <form id="registerForm" class="space-y-4">
      <div>
        <label for="username" class="block text-gray-600 mb-2">Username</label>
        <input
          type="text"
          name="username"
          id="username"
          required
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <div>
        <label for="email" class="block text-gray-600 mb-2">Email</label>
        <input
          type="email"
          name="email"
          id="email"
          required
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <div>
        <label for="password" class="block text-gray-600 mb-2">Password</label>
        <input
          type="password"
          name="password"
          id="password"
          required
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <div>
        <label for="role" class="block text-gray-600 mb-2">Role</label>
        <select
          name="role"
          id="role"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        >
          <option value="buyer" selected>Buyer</option>
          <option value="artist">Artist</option>
          <option value="admin">Admin</option>
        </select>
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition"
      >
        Register
      </button>
    </form>

    <p class="text-center text-gray-600 mt-4">
      Already have an account?
      <a href="./login.html" class="text-blue-600 hover:underline">Login</a>
    </p>

    <p id="register-message" class="text-center mt-4 text-sm"></p>
  </div>

  <!-- Shared auth logic -->
  <script type="module" src="./js/auth.js"></script>
</body>
</html>
