<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Orders — SANAA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'display': ['Playfair Display', 'serif'],
            'sans': ['Inter', 'sans-serif'],
          },
          colors: {
            'gallery': {
              50: '#fafafa',
              100: '#f5f5f5',
              200: '#e5e5e5',
              300: '#d4d4d4',
              400: '#a3a3a3',
              500: '#737373',
              600: '#525252',
              700: '#404040',
              800: '#262626',
              900: '#171717',
              950: '#0a0a0a',
            },
            'accent': {
              DEFAULT: '#c9a962',
              light: '#dfc88a',
              dark: '#a88b3d',
            }
          },
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out',
            'slide-up': 'slideUp 0.6s ease-out',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
        },
      },
    }
  </script>

  <style>
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #f5f5f5;
    }
    ::-webkit-scrollbar-thumb {
      background: #d4d4d4;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #a3a3a3;
    }
  </style>
</head>
<body class="bg-gallery-50 text-gallery-900 min-h-screen font-sans antialiased flex flex-col">

  <!-- Header -->
  <header class="bg-white/95 backdrop-blur-md sticky top-0 z-50 border-b border-gallery-100">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16 lg:h-20">
        
        <!-- Logo -->
        <a href="./index.html" class="flex items-center gap-2 group">
          <div class="w-10 h-10 bg-gallery-900 rounded-full flex items-center justify-center group-hover:bg-accent transition-colors duration-300">
            <span class="text-white font-display text-lg">S</span>
          </div>
          <span class="font-display text-2xl tracking-tight hidden sm:block">
            SANAA
          </span>
        </a>

        <!-- Nav -->
        <nav class="flex items-center gap-4 sm:gap-6 text-sm">
          <a href="./index.html" class="text-gallery-600 hover:text-gallery-900 transition hidden sm:inline">Home</a>
          <a href="./cart.html" class="text-gallery-600 hover:text-gallery-900 transition flex items-center gap-1.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
            </svg>
            <span class="hidden sm:inline">Cart</span>
          </a>
          <a href="./my-orders.html" class="text-gallery-900 font-semibold flex items-center gap-1.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
            </svg>
            My Orders
          </a>
          <a href="./login.html" class="text-gallery-600 hover:text-gallery-900 transition p-2 hover:bg-gallery-100 rounded-full" title="Logout">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
            </svg>
          </a>
        </nav>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 py-8 lg:py-12">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      
      <!-- Page Header -->
      <div class="mb-8 animate-fade-in">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
          <div>
            <h1 class="font-display text-3xl lg:text-4xl text-gallery-900 mb-2">My Orders</h1>
            <p class="text-gallery-500">Track and manage your art purchases</p>
          </div>
          <a href="./index.html" class="inline-flex items-center gap-2 px-5 py-2.5 bg-gallery-900 text-white rounded-full text-sm font-medium hover:bg-accent transition group">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"/>
            </svg>
            Browse Artworks
          </a>
        </div>
      </div>

      <!-- Order Stats (Quick Overview) -->
      <div id="order-stats" class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
        <!-- JS will populate or hide -->
      </div>

      <!-- Message Area -->
      <div id="orders-message" class="mb-6 hidden">
        <!-- JS will populate -->
      </div>

      <!-- Orders Container -->
      <div id="orders-container" class="space-y-4">
        <!-- Loading Skeleton -->
        <div class="order-skeleton space-y-4">
          <div class="bg-white rounded-2xl p-6 animate-pulse">
            <div class="flex justify-between items-start">
              <div class="space-y-2">
                <div class="h-5 bg-gallery-200 rounded w-32"></div>
                <div class="h-4 bg-gallery-200 rounded w-48"></div>
              </div>
              <div class="h-6 bg-gallery-200 rounded-full w-24"></div>
            </div>
            <div class="mt-4 pt-4 border-t border-gallery-100 flex justify-between">
              <div class="h-4 bg-gallery-200 rounded w-20"></div>
              <div class="h-5 bg-gallery-200 rounded w-28"></div>
            </div>
          </div>
          <div class="bg-white rounded-2xl p-6 animate-pulse">
            <div class="flex justify-between items-start">
              <div class="space-y-2">
                <div class="h-5 bg-gallery-200 rounded w-32"></div>
                <div class="h-4 bg-gallery-200 rounded w-48"></div>
              </div>
              <div class="h-6 bg-gallery-200 rounded-full w-24"></div>
            </div>
            <div class="mt-4 pt-4 border-t border-gallery-100 flex justify-between">
              <div class="h-4 bg-gallery-200 rounded w-20"></div>
              <div class="h-5 bg-gallery-200 rounded w-28"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Empty State (Hidden by default) -->
      <div id="empty-state" class="hidden text-center py-16">
        <div class="w-24 h-24 bg-gallery-100 rounded-full flex items-center justify-center mx-auto mb-6">
          <svg class="w-12 h-12 text-gallery-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
          </svg>
        </div>
        <h3 class="font-display text-2xl text-gallery-900 mb-2">No orders yet</h3>
        <p class="text-gallery-500 mb-8 max-w-md mx-auto">
          You haven't placed any orders yet. Start exploring our collection of beautiful artworks.
        </p>
        <a href="./index.html" class="inline-flex items-center gap-2 px-6 py-3 bg-gallery-900 text-white rounded-full font-medium hover:bg-accent transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          Explore Collection
        </a>
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-gallery-900 text-white py-8 mt-auto">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="flex items-center gap-2">
          <div class="w-8 h-8 bg-accent rounded-full flex items-center justify-center">
            <span class="text-white font-display text-sm">S</span>
          </div>
          <span class="font-display text-lg">SANAA</span>
        </div>
        <div class="flex gap-6 text-sm text-gallery-400">
          <a href="#" class="hover:text-accent transition">Help Center</a>
          <a href="#" class="hover:text-accent transition">Returns</a>
          <a href="#" class="hover:text-accent transition">Contact</a>
        </div>
        <p class="text-sm text-gallery-500">© 2024 SANAA. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script type="module" src="./js/my-orders.js"></script>
</body>
</html>
