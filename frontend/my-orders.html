<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Art Marketplace – My Orders</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">

  <!-- Header -->
  <header class="bg-white shadow">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="./index.html" class="text-xl font-bold text-indigo-700">
        Art<span class="text-gray-900">Market</span>
      </a>

      <nav class="flex gap-4 text-sm">
        <a href="./index.html" class="text-gray-600 hover:text-indigo-600">Home</a>
        <a href="./cart.html" class="text-gray-600 hover:text-indigo-600">My Cart</a>
        <a href="./my-orders.html" class="text-indigo-700 font-semibold">My Orders</a>
        <a href="./login.html" class="text-gray-600 hover:text-indigo-600">Logout</a>
      </nav>
    </div>
  </header>

  <main class="flex-1">
    <section class="max-w-6xl mx-auto px-4 py-8">
      <h1 class="text-2xl font-bold mb-2">My Orders</h1>
      <p class="text-sm text-gray-500 mb-6">
        View the status of your recent orders and deliveries.
      </p>

      <!-- Message -->
      <div
        id="orders-message"
        class="mb-4 text-sm hidden"
      ></div>

      <!-- Orders list -->
      <div id="orders-container" class="space-y-4">
        <!-- JS will render order cards here -->
      </div>
    </section>
  </main>

  <script type="module" src="./js/my-orders.js"></script>
</body>
</html>
