<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Forgot Password | Kenyan Art Market</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

    <!-- Form State -->
    <div id="form-state">
      <h2 class="text-2xl font-bold mb-2 text-center text-gray-700">🔑 Forgot Password</h2>
      <p class="text-center text-gray-500 mb-6">Enter your email and we'll send you a reset link</p>

      <form id="forgotForm" class="space-y-4">
        <div>
          <label for="email" class="block text-gray-600 mb-2">Email Address</label>
          <input type="email" id="email" name="email" required
            placeholder="your@email.com"
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" />
        </div>

        <button type="submit" id="submitBtn"
          class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-medium">
          Send Reset Link
        </button>
      </form>

      <p class="text-center text-gray-600 mt-4">
        Remember your password?
        <a href="./login.html" class="text-blue-600 hover:underline">Back to Login</a>
      </p>
    </div>

    <!-- Success State (hidden by default) -->
    <div id="success-state" class="hidden text-center space-y-4">
      <div class="text-5xl">📧</div>
      <h3 class="text-lg font-semibold text-gray-700">Check Your Email</h3>
      <p id="success-email-text" class="text-gray-500 text-sm"></p>
      <p class="text-gray-400 text-xs">The link expires in 30 minutes.</p>
      <a href="./login.html" class="inline-block mt-4 text-blue-600 hover:underline text-sm">
        Back to Login
      </a>
    </div>

    <p id="forgot-message" class="text-center mt-4 text-sm"></p>
  </div>

  <script type="module" src="./js/forgot-password.js"></script>
</body>
</html>
