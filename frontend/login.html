<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | Kenyan Art Market</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold mb-2 text-center text-gray-700">🛒 Buyer Login</h2>
    <p class="text-center text-gray-500 mb-6">Welcome to Kenyan Art Market</p>

    <form id="loginForm" class="space-y-4">
      <div>
        <label for="email" class="block text-gray-600 mb-2">Email</label>
        <input type="email" id="email" name="email" required
          placeholder="your@email.com"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>

      <div>
        <label for="password" class="block text-gray-600 mb-2">Password</label>
        <input type="password" id="password" name="password" required
          placeholder="••••••••"
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
         <div class="text-right">
        <a href="./forgot-password.html" class="text-sm text-blue-600 hover:underline">
          Forgot password?
        </a>
      </div>

      <button type="submit" id="loginBtn"
        class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-medium">
        Login
      </button>
    </form>

    <p class="text-center text-gray-600 mt-4">
      Don't have an account?
      <a href="./register.html" class="text-blue-600 hover:underline">Register</a>
    </p>

    <div class="mt-6 pt-4 border-t text-center text-sm text-gray-400">
      <a href="./artist-login.html" class="hover:text-green-600">Artist Login</a>
      &nbsp;·&nbsp;
      <a href="./admin-login.html" class="hover:text-purple-600">Admin Login</a>
    </div>

    <p id="login-message" class="text-center mt-4 text-sm"></p>
  </div>

  <script type="module" src="./js/buyer-auth.js"></script>
</body>
</html>
