<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | Art Market</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-700">Login</h2>

    <form id="loginForm" class="space-y-4">
      <div>
        <label for="email" class="block text-gray-600 mb-2">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <div>
        <label for="password" class="block text-gray-600 mb-2">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition"
      >
        Login
      </button>
    </form>

    <p class="text-center text-gray-600 mt-4">
      Don’t have an account?
      <a href="./register.html" class="text-blue-600 hover:underline">Register</a>
    </p>

    <p id="login-message" class="text-center mt-4 text-sm text-red-600"></p>
  </div>

  <!-- Shared auth logic (no inline code) -->
  <script type="module" src="./js/auth.js"></script>
</body>
</html>
