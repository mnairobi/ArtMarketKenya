<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Cart | Art Market</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

<header class="bg-white shadow">
  <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
    <a href="./index.html" class="text-xl font-bold text-indigo-700">
      Art<span class="text-gray-900">Market</span>
    </a>

    <nav class="flex items-center gap-4 text-sm">
      <a href="./index.html" class="text-gray-600 hover:text-indigo-600">Home</a>
      <a href="./cart.html" class="text-gray-900 font-semibold">Cart</a>

      <div class="flex items-center gap-2 ml-4">
        <span class="text-xs text-gray-500">Items:</span>
        <span
          id="cart-count"
          class="inline-flex items-center justify-center px-2 py-1 text-xs font-semibold rounded-full bg-indigo-100 text-indigo-700"
        >
          0
        </span>
      </div>
    </nav>
  </div>
</header>

  <!-- Main -->
  <main class="flex-1">
    <div class="max-w-6xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">

      <!-- Cart items -->
      <section class="lg:col-span-2 bg-white rounded-2xl shadow p-4 md:p-6">
        <h1 class="text-xl font-semibold text-gray-800 mb-4">My Cart</h1>

        <p
          id="cart-message"
          class="text-sm text-gray-500 mb-4 hidden"
        ></p>

        <div id="cart-items-container" class="space-y-4">
          <!-- JS will inject cart item rows here -->
        </div>

        <!-- Template for cart item -->
        <template id="cart-item-template">
          <div class="flex gap-3 md:gap-4 items-center border rounded-xl p-3 md:p-4 bg-white">
            <div class="w-20 h-20 md:w-24 md:h-24 bg-gray-100 rounded overflow-hidden flex items-center justify-center flex-shrink-0">
              <img
                class="cart-item-image w-full h-full object-cover"
                alt="Painting"
              />
            </div>

            <div class="flex-1 min-w-0">
              <h3 class="cart-item-title text-sm md:text-base font-semibold text-gray-800 truncate">
                Title
              </h3>
              <p class="cart-item-price text-xs md:text-sm text-gray-500 mt-0.5">
                Ksh 0
              </p>
              <p class="cart-item-subtotal text-xs md:text-sm text-gray-700 mt-1">
                Subtotal: Ksh 0
              </p>

              <div class="mt-2 flex items-center gap-2">
                <button
                  class="qty-decr px-2 py-1 border rounded text-xs"
                >
                  -
                </button>
                <input
                  type="number"
                  class="qty-input w-12 text-center border rounded text-xs py-1"
                  min="1"
                  value="1"
                />
                <button
                  class="qty-incr px-2 py-1 border rounded text-xs"
                >
                  +
                </button>

                <button
                  class="remove-item ml-auto text-xs text-red-500 hover:text-red-600"
                >
                  Remove
                </button>
              </div>
            </div>
          </div>
        </template>
      </section>

      <!-- Summary -->
      <aside class="bg-white rounded-2xl shadow p-4 md:p-6 h-fit">
        <h2 class="text-lg font-semibold text-gray-800 mb-4">Summary</h2>

        <div class="flex justify-between text-sm text-gray-700 mb-2">
          <span>Subtotal</span>
          <span id="summary-subtotal">Ksh 0.00</span>
        </div>

        <div class="flex justify-between text-sm text-gray-500 mb-4">
          <span>Estimated shipping</span>
          <span id="summary-shipping">Ksh 0.00</span>
        </div>

        <div class="border-t pt-3 mt-3 flex justify-between text-base font-semibold text-gray-900 mb-4">
          <span>Total</span>
          <span id="summary-total">Ksh 0.00</span>
        </div>

        <!-- <button
          id="checkout-btn"
          class="w-full bg-indigo-600 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-indigo-700 mb-3"
        >
          Proceed to checkout
        </button> -->
        <!-- Cart page: replace the button with this -->
<a
  href="./checkout.html"
  class="block w-full bg-indigo-600 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-indigo-700 mb-3 text-center"
  id="checkout-btn"
>
  Proceed to checkout
</a>

        <button
          id="clear-cart-btn"
          class="w-full border border-gray-300 text-gray-700 py-2.5 rounded-lg text-sm font-medium hover:bg-gray-50"
        >
          Clear cart
        </button>
      </aside>
    </div>
  </main>

  <script type="module" src="./js/cart.js"></script>
</body>
</html>
